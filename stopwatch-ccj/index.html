<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch AI4Devs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            width: 450px;
        }
        .display-container {
            background-color: #e8ebff;
            border: 4px solid #333;
            border-radius: 40px;
            padding: 20px;
            position: relative;
            margin-bottom: 30px;
        }
        #time-input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 80px;
            text-align: center;
            color: #000;
            outline: none;
            font-family: monospace;
        }
        .ms-label {
            position: absolute;
            bottom: 10px;
            right: 40px;
            font-size: 24px;
            font-weight: bold;
        }
        .buttons {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        button {
            flex: 1;
            padding: 15px;
            font-size: 32px;
            border-radius: 15px;
            border: 3px solid #333;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        #startBtn { background-color: #66ff66; color: #000; }
        #clearBtn { background-color: #ff3333; color: #000; }
    </style>
</head>
<body>

<div class="container">
    <div class="display-container">
        <input type="text" id="time-input" value="00:00:00" maxlength="8">
        <div class="ms-label" id="ms-display">000</div>
    </div>
    
    <div class="buttons">
        <button id="startBtn">Start</button>
        <button id="clearBtn">Clear</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
